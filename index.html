<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>OC Player Dashboard</title>
<style>
  html,body{margin:0;height:100%;background:#0d1b2a;color:#eaf0f8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
  form{width:100%;max-width:320px;text-align:center;}
  img.ic{width:84px;height:84px;border-radius:20px;margin-bottom:18px;}
  h1{font-size:20px;font-weight:800;margin:0 0 6px;}
  p{color:#90a4c4;font-size:14px;margin:0 0 20px;}
  input{width:100%;padding:14px;font-size:16px;border-radius:12px;border:1px solid #2a3c5e;
    background:#15243f;color:#eaf0f8;outline:none;margin-bottom:12px;}
  button{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:12px;
    background:#c8881f;color:#fff;cursor:pointer;font-family:inherit;}
  #err{color:#e8554d;font-size:13px;margin-top:12px;min-height:16px;}
  #busy{color:#90a4c4;font-size:13px;margin-top:12px;min-height:16px;}
</style>
</head>
<body>
<div id="gate">
  <form id="f">
    <img class="ic" src="icon-192.png" alt="">
    <h1>OC Player Dashboard</h1>
    <p>Enter the password to view the dashboard.</p>
    <input type="password" id="pw" autocomplete="current-password" placeholder="Password" autofocus>
    <button type="submit">Unlock</button>
    <div id="err"></div>
    <div id="busy"></div>
  </form>
</div>

const ITER = 250000;
const KEY = "oc_pw_v1";
function b64(s){ const b=atob(s); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return u; }
async function unlock(pw){
  const raw=b64(BLOB), salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km=await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:ITER, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, data);
  return new TextDecoder().decode(plain);
}
async function tryUnlock(pw, remember){
  document.getElementById("err").textContent="";
  document.getElementById("busy").textContent="Unlocking…";
  try{
    const html=await unlock(pw);
    if(remember) localStorage.setItem(KEY, pw);
    document.open(); document.write(html); document.close();
  }catch(e){
    localStorage.removeItem(KEY);
    document.getElementById("busy").textContent="";
    document.getElementById("err").textContent="Wrong password — try again.";
  }
}
document.getElementById("f").addEventListener("submit", e=>{
  e.preventDefault(); tryUnlock(document.getElementById("pw").value, true);
});
const saved=localStorage.getItem(KEY);
if(saved) tryUnlock(saved, false);
</script>
